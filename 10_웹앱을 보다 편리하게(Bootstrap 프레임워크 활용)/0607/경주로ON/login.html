<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경주로ON - 로그인</title>
  <!-- 부트스트랩 아이콘 cdn -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./css/reset.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    header{
      display: flex;
      justify-content: space-between;
      padding: 5px;
      font-size: 1rem;
    }
    header span{font-weight: bold;line-height: 40px;}
    header a{
      width: 40px;height: 40px;
      display: block;
      text-align: center;
    }
    header a i{line-height: 40px;}

    /* 메인 서식 */
    .logo{
      width: 200px;
    }
    .login_large_txt{
      font-size: 1.5rem;
      font-weight: bold;
    }
    #email, #pw{
      height: 50px;
    }



    /* 하단 바텀바 서식 */
    nav{
      position: fixed;
      width: 100%;
      bottom: 0;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      border-radius: 20px 20px 0 0;
      background: white;
    }
    ul{
      display: flex;
      justify-content: space-evenly;
      width: 100%;
    }
    ul li{
      text-align: center;
      width: 60px; height: 60px;
      line-height: 60px;
    }
    a{display: block;}
    ul li i{
      font-size: 1.5rem;
    }
    ul li:nth-of-type(3) i{
      color: rgb(69, 103, 255);
    }
  </style>
</head>
<body>
  <header>
    <a href="#" title="뒤로가기">
      <i class="bi bi-chevron-left"></i>
    </a>
    <span>로그인</span>
    <a href="#" title="홈으로">
      <i class="bi bi-house"></i>
    </a>
  </header>

  <!-- 메인서식 -->
  <main>

    <div class="p-5">

      <div>
        <div class="login_txt_wrap">
          <div class="logo mb-4"><img src="./images/logo.svg" alt="로고"></div>
          <div class="login_large_txt">함께 여행을 떠나볼까요?</div>
          <div class="login_small_txt text-secondary mb-5">로그인이 필요한 서비스에요</div>
        </div>
          <div class="login_form">
            <form action="#" id="loginForm" name="loginForm" method="post">
              <div class="fs-4 mb-2">
                <label for="email" class="form-label fw-bold fs-6">아이디</label>
                <input type="email" class="form-control" name="id" id="email" placeholder="이메일을 입력해주세요" value="">
                <small class="d-block text-danger"></small>
              </div>
                <div class="fs-4 mb-4">
                    <label for="pw" class="form-label fw-bold fs-6">비밀번호</label>
                    <small class="d-block text-secondary" style="font-size: 14px;">8자 이상의 영문,숫자,특수문자(!@#$%&amp;)사용</small>
                    <div style="position: relative;">
                      <input type="password" class="form-control" name="password" id="pw" placeholder="비밀번호를 입력해 주세요">
                      <button type="button" id="showPassword" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer;"><i id="showPasswordIcon" class="fa-solid fa-eye" aria-hidden="true"></i></button>
                  </div>
                  </div>
                    <small class="d-block pt-2 text-danger">8자 이상의 영문,숫자,특수문자(!@#$%&amp;)사용</small>
            </form>
          </div>
                  <div class="container text-center fs-5 mb-4">
                      <div class="row">
                          <div class="col border-end"><a href="/member/lostId.nm?lang=KO" class="link-secondary">아이디 찾기</a></div>
                          <div class="col border-end"><a href="/member/lostPw/inputId.nm?lang=KO" class="link-secondary">비밀번호 찾기</a></div>
                          <div class="col"><a href="/member/join.nm?lang=KO" class="link-secondary">회원가입</a></div>
                      </div>
                  </div>
                  <div class="d-grid gap-2 mb-5">
                      <button class="btn color-1" type="submit">로그인</button>
                  </div>
                  <div class="fs-4 mb-3">
                      <div class="text-center text-secondary mb-2">간편로그인</div>
                  </div>
                  <div class="container text-center fs-5">
                      <div class="row">
                          <div class="col"><a href="javascript:authLogin('kakao')" class="link-secondary"><img src="/images/login/login_kakao.png" alt="카카오톡 로그인"></a></div>
                          <div class="col"><a href="javascript:authLogin('naver')" class="link-secondary"><img src="/images/login/login_naver.png" alt="네이버 로그인"></a></div>
                          <div class="col"><a href="javascript:authLogin('google')" class="link-secondary"><img src="/images/login/icon_goggle.png" alt="구글 로그인"></a></div>
                          <div class="col" id="loginBtnApple" style="display: none;"><a href="javascript:authLogin('apple')" class="link-secondary"><img src="/images/login/icon_apple.png" alt="애플 로그인"></a></div>
                      </div>
                  </div>
              
          </div>
      </div>

  </main>


  <!-- 하단 바텀바 -->
  <nav>
    <ul>
      <li>
        <a href="#">
          <i class="bi bi-house"></i>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="bi bi-bookmark"></i>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="bi bi-geo-alt-fill"></i>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="bi bi-person"></i>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="bi bi-list"></i>
        </a>
      </li>
    </ul>
  </nav>
</body>
</html>
